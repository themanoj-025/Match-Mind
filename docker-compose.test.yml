version: '3.8'

services:
  postgres-test:
    image: postgres:15
    container_name: matchmind_test_db
    environment:
      POSTGRES_USER: matchmind
      POSTGRES_PASSWORD: matchmind_test_password
      POSTGRES_DB: matchmind_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matchmind -d matchmind_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-test:
    image: redis:7
    container_name: matchmind_test_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
