<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary Meta Tags -->
    <title>MatchMind — The Internet's Sports Bar</title>
    <meta name="title" content="MatchMind — The Internet's Sports Bar" />
    <meta name="description" content="Watch live sports, predict scores, compete on leaderboards, and chat with fans in real-time. The Internet's Sports Bar." />
    <meta name="keywords" content="sports, predictions, live scores, football, NBA, NFL, tennis, cricket, leaderboard, chat" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="author" content="MatchMind" />
    <meta name="theme-color" content="#0A0B0F" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MatchMind" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-startup-image" href="/icons/icon-512x512.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#00E676" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://matchmind.gg/" />
    <meta property="og:title" content="MatchMind — The Internet's Sports Bar" />
    <meta property="og:description" content="Watch live sports, predict scores, compete on leaderboards, and chat with fans in real-time." />
    <meta property="og:image" content="https://matchmind.gg/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="MatchMind" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@MatchMindGG" />
    <meta name="twitter:title" content="MatchMind — The Internet's Sports Bar" />
    <meta name="twitter:description" content="Watch live. Predict scores. Compete with the world." />
    <meta name="twitter:image" content="https://matchmind.gg/og-image.png" />

    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#0A0B0F" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://matchmind-api.railway.app" />

    <!-- Canonical -->
    <link rel="canonical" href="https://matchmind.gg/" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "MatchMind",
      "url": "https://matchmind.gg",
      "description": "A social sports prediction platform where fans watch live scores, predict outcomes, compete on leaderboards, and chat in real-time.",
      "applicationCategory": "EntertainmentApplication",
      "operatingSystem": "Web",
      "browserRequirements": "Requires JavaScript",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Organization",
        "name": "MatchMind"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {})
        })
      }
    </script>
  </body>
</html>
