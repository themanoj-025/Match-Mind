services:
  postgres:
    image: postgres:16-alpine
    container_name: matchmind-db
    restart: unless-stopped
    ports:
      - "5433:5432"      # Port 5433 to avoid conflict with native PostgreSQL on 5432
    environment:
      POSTGRES_USER: matchmind
      POSTGRES_PASSWORD: matchmind_pass
      POSTGRES_DB: matchmind
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matchmind"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: matchmind-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
