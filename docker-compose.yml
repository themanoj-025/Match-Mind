services:
  postgres:
    image: postgres:16-alpine
    container_name: matchmind-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-matchmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-matchmindpassword}
      POSTGRES_DB: ${POSTGRES_DB:-matchmind}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-matchmind} -d ${POSTGRES_DB:-matchmind}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: matchmind-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matchmind-api
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:-postgresql://matchmind:matchmindpassword@postgres:5432/matchmind?schema=public}
      REDIS_URL: 'redis://redis:6379'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3001/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
  redisdata:
