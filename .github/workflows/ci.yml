name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: matchmind
          POSTGRES_PASSWORD: matchmind_password
          POSTGRES_DB: matchmind_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      redis:
        image: redis:7
        ports:
          - 6379:6379
          
    env:
      DATABASE_URL: postgresql://matchmind:matchmind_password@localhost:5432/matchmind_db
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-very-long-string-for-security
      JWT_REFRESH_SECRET: test-jwt-refresh-secret-very-long-string-for-security
      JWT_RESET_SECRET: test-jwt-reset-secret-very-long-string-for-security
      PORT: 5000

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm run install:all
        
      - name: Run Database Migrations
        run: |
          cd backend
          npx prisma generate
          npx prisma migrate deploy
          
      - name: Typecheck
        run: npm run typecheck
        
      - name: Lint
        run: npm run lint
        
      - name: Check API Documentation Coverage
        run: |
          cd backend
          npm run check-api
          
      - name: Run Tests
        run: npm run test
