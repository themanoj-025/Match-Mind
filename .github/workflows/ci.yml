name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─── Backend: test + lint + coverage ─────────────────
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: matchmind
          POSTGRES_PASSWORD: matchmind_pass
          POSTGRES_DB: matchmind_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: ./backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://matchmind:matchmind_pass@localhost:5432/matchmind_test

      - name: Push schema to test database
        working-directory: ./backend
        run: npx prisma db push --force-reset
        env:
          DATABASE_URL: postgresql://matchmind:matchmind_pass@localhost:5432/matchmind_test

      - name: Run tests with coverage
        working-directory: ./backend
        run: npx vitest run --coverage
        env:
          DATABASE_URL: postgresql://matchmind:matchmind_pass@localhost:5432/matchmind_test
          JWT_SECRET: ci-test-jwt-secret-64-chars-minimum-for-testing-purposes
          JWT_REFRESH_SECRET: ci-test-refresh-secret-64-chars-minimum-for-ci-tests
          JWT_RESET_SECRET: ci-test-reset-secret-64-chars-minimum-for-ci-purposes
          LOG_LEVEL: silent
          NODE_ENV: test

      - name: Syntax check — require all modules
        working-directory: ./backend
        run: |
          errors=0
          for file in $(find src -name '*.js' -not -path '*/node_modules/*' | sort); do
            if node -c "$file" 2>/dev/null; then
              echo "  ✓ $file"
            else
              echo "  ✗ FAILED: $file"
              errors=$((errors + 1))
            fi
          done
          echo "=== $errors file(s) failed ==="
          [ "$errors" -eq 0 ] || exit 1

  # ─── Frontend: lint + typecheck + build ─────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint

      - name: TypeScript type check
        working-directory: ./frontend
        run: npm run typecheck

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
