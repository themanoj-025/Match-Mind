name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Syntax check — require all modules
        working-directory: ./backend
        run: |
          errors=0
          for file in $(find src -name '*.js' -not -path '*/node_modules/*' | sort); do
            if node -c "$file" 2>/dev/null; then
              echo "  ✓ $file"
            else
              echo "  ✗ FAILED: $file"
              errors=$((errors + 1))
            fi
          done
          echo "=== $errors file(s) failed ==="
          [ "$errors" -eq 0 ] || exit 1

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint
        continue-on-error: true

      - name: TypeScript type check
        working-directory: ./frontend
        run: npm run typecheck
        continue-on-error: true

  frontend-build:
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for broken links in docs
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config /dev/null
            --no-progress
            --exclude 'https?://localhost'
            --exclude 'https?://127\.0\.0\.1'
            --exclude 'https?://.*shields\.io'
            --exclude 'https?://.*example\.com'
            --exclude 'https?://.*test\.org'
            --exclude 'https?://.*yourusername.*'
            --exclude 'https?://.*your-username.*'
            --exclude 'https?://.*\{.*\}.*'
            --exclude 'https?://.*fonts\.gstatic\.com'
            --exclude 'https?://.*fonts\.googleapis\.com'
            '**/*.md'
        continue-on-error: true
