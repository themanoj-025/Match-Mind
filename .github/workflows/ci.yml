name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend: install → typecheck → lint → test ──────
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: TypeScript type check
        working-directory: ./backend
        run: npx tsc --noEmit

      - name: Lint backend
        working-directory: ./backend
        run: npx eslint .

      - name: Run tests
        working-directory: ./backend
        run: npx vitest run
        env:
          JWT_SECRET: ci-test-jwt-secret-64-chars-minimum-for-testing-purposes
          JWT_REFRESH_SECRET: ci-test-refresh-secret-64-chars-minimum-for-ci-tests
          JWT_RESET_SECRET: ci-test-reset-secret-64-chars-minimum-for-ci-purposes
          LOG_LEVEL: silent
          NODE_ENV: test

  # ─── Frontend: install → lint → typecheck → test → build ──
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint

      - name: TypeScript type check
        working-directory: ./frontend
        run: npm run typecheck

      - name: Run frontend tests
        working-directory: ./frontend
        run: npx vitest run

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
